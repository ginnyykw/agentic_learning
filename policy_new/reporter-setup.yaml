# Reporter setup policy — allows PyPI access for dependency installation.
# This should be applied during setup and then reverted to restricted.

version: 1
filesystem_policy:
  include_workdir: true
  read_only:
    - /usr
    - /lib
    - /opt/hermes
    - /proc
    - /dev/urandom
    - /app
    - /etc
    - /var/log
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /sandbox/.hermes
    - /sandbox/.openclaw
    - /sandbox/.nemoclaw
    - /home/linuxbrew
    - /proc
    - /sandbox
    - /dev/nvidiactl
    - /dev/nvidia-uvm
    - /dev/nvidia-uvm-tools
    - /dev/nvidia-modeset
    - /dev/nvidia0
landlock:
  compatibility: best_effort
process:
  run_as_user: sandbox
  run_as_group: sandbox
network_policies:
  pypi:
    name: pypi
    endpoints:
      - host: pypi.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
      - host: files.pythonhosted.org
        port: 443
        protocol: rest
        enforcement: enforce
        rules:
          - allow: { method: GET, path: "/**" }
          - allow: { method: HEAD, path: "/**" }
    binaries:
      - { path: /usr/bin/python3* }
      - { path: /usr/bin/pip* }
      - { path: /usr/local/bin/python3* }
      - { path: /usr/local/bin/pip* }
      - { path: /sandbox/.venv/bin/python* }
      - { path: /sandbox/.venv/bin/pip* }
      - { path: /sandbox/.uv/python/**/python* }
      - { path: /sandbox/.local/bin/pip* }
